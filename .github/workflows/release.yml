name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (如 1.0.0)"
        required: true
        default: "0.1.0"

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = "${{ github.ref_name }}".TrimStart('v')
          }
          "VERSION=$v" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build FindXNative (C++)
        run: msbuild native\FindXNative\FindXNative.vcxproj /p:Configuration=Release /p:Platform=x64 /v:m

      - name: Build Rust engine
        working-directory: native/findx-engine
        run: cargo build --release

      - name: Run tests
        run: dotnet test src/FindX.Tests/FindX.Tests.csproj -c Release --verbosity normal

      - name: Publish Service
        run: >
          dotnet publish src/FindX.Service/FindX.Service.csproj
          -c Release -o publish/service
          -p:Version=${{ steps.ver.outputs.VERSION }}
          --no-self-contained

      - name: Publish CLI
        run: >
          dotnet publish src/FindX.Cli/FindX.Cli.csproj
          -c Release -o publish/cli
          -p:Version=${{ steps.ver.outputs.VERSION }}
          --no-self-contained

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Download Inno Setup Chinese language file
        shell: pwsh
        run: |
          $langDir = "${env:ProgramFiles(x86)}\Inno Setup 6\Languages"
          $url = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          Invoke-WebRequest -Uri $url -OutFile "$langDir\ChineseSimplified.isl"

      - name: Build installer
        shell: pwsh
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.ver.outputs.VERSION }}
          installer\FindX.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FindX-${{ steps.ver.outputs.VERSION }}-setup
          path: dist/FindX-${{ steps.ver.outputs.VERSION }}-setup.exe

      - name: Upload portable (service)
        uses: actions/upload-artifact@v4
        with:
          name: FindX-${{ steps.ver.outputs.VERSION }}-portable-service
          path: publish/service/

      - name: Upload portable (cli)
        uses: actions/upload-artifact@v4
        with:
          name: FindX-${{ steps.ver.outputs.VERSION }}-portable-cli
          path: publish/cli/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: FindX ${{ steps.ver.outputs.VERSION }}
          files: dist/FindX-${{ steps.ver.outputs.VERSION }}-setup.exe
          generate_release_notes: true

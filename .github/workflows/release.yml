name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 2.0.0）"
        required: true
        default: "2.0.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = ("${{ github.ref_name }}").TrimStart("v")
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "VERSION=$v"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: 构建 Tauri 程序与 resources（不打 NSIS/MSI）
        working-directory: gui
        shell: pwsh
        run: |
          # 避免本机/Runner 残留 CARGO_TARGET_DIR 导致产物不在仓库根 target\release，stage-inno 找不到
          Remove-Item Env:CARGO_TARGET_DIR -ErrorAction SilentlyContinue
          npm run tauri build -- --no-bundle

      - name: 确认 Tauri release 产物（供 Inno stage）
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          Remove-Item Env:CARGO_TARGET_DIR -ErrorAction SilentlyContinue
          $rels = @(
            (Join-Path $ws "target\release"),
            (Join-Path $ws "target\x86_64-pc-windows-msvc\release"),
            (Join-Path $ws "gui\target\release")
          )
          $gui = $null
          foreach ($r in $rels) {
            if (Test-Path (Join-Path $r "findx2-gui.exe")) { $gui = Join-Path $r "findx2-gui.exe"; break }
            if (Test-Path (Join-Path $r "FindX.exe")) { $gui = Join-Path $r "FindX.exe"; break }
          }
          if (-not $gui) {
            Write-Host "---- 未找到 GUI exe，已检查目录 ----"
            $rels | ForEach-Object { Write-Host $_ }
            if (Test-Path (Join-Path $ws "target")) {
              Get-ChildItem (Join-Path $ws "target") -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
            }
            throw "Tauri 构建后未找到 findx2-gui.exe 或 FindX.exe，stage-inno 无法继续。"
          }
          $resDir = Join-Path (Split-Path $gui) "resources"
          # no-bundle 且 bundle.targets 为空时，Tauri 可能不把 resources 物化到 target\release 旁，由 stage-inno 用图标兜底
          if (Test-Path $resDir) {
            Write-Host "OK resources: $resDir"
          } else {
            Write-Host "WARN: 无 $resDir ，stage-inno 将写入最小 resources 供 Inno 匹配 resources\*"
          }
          Write-Host "OK gui: $gui"

      - name: 安装 Inno Setup 并制包
        shell: pwsh
        run: |
          choco install innosetup -y
          $v = "${{ steps.ver.outputs.VERSION }}"
          $ws = $env:GITHUB_WORKSPACE
          # 勿再套一层 Windows PowerShell 5.1 -File：Runner 上易出现编码/退出码与主 pwsh 不一致，导致 stage 未执行却仍往下跑
          $stageScript = Join-Path $ws "installer\stage-inno.ps1"
          & $stageScript -RepoRoot $ws
          $stage = Join-Path $ws "installer\stage"
          $marker = Join-Path $stage "FindX.exe"
          if (-not (Test-Path $marker)) {
            Write-Host "---- installer\stage 内容 ----"
            if (Test-Path $stage) {
              Get-ChildItem $stage -Force -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            } else {
              Write-Host "(installer\stage 目录不存在)"
            }
            throw "仍缺少 $marker。请查看上方 [stage-inno] 日志与 stage 列表。"
          }
          $stageAbs = (Resolve-Path $stage).Path
          $iscc = "$(${env:ProgramFiles(x86)})\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = Join-Path $env:LOCALAPPDATA "Programs\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "未找到 ISCC（已尝试 Program Files (x86) 与 LocalAppData）。请确认 choco innosetup 或手动安装 Inno 6。" }
          $iss = Join-Path $ws "installer\FindX.iss"
          # 勿用 "/DPublishDir=$stageAbs"：路径中含 \f 等时 PowerShell 双引号会误解析转义
          $publishArg = '/DPublishDir=' + ($stageAbs.Replace('\', '/'))
          & $iscc /DMyAppVersion=$v $publishArg $iss

      - name: Collect artifacts
        shell: pwsh
        run: |
          $d = "$env:GITHUB_WORKSPACE\dist"
          if (-not (Get-ChildItem $d -Filter "FindX-*-setup.exe" -File -ErrorAction SilentlyContinue)) {
            Get-ChildItem $d -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "dist: $($_.Name)" }
            Write-Error "未找到 dist 下的 FindX-*-setup.exe，请检查 Inno 是否成功。"
            exit 1
          }
          Get-ChildItem $d -Filter "FindX-*-setup.exe" -File | ForEach-Object { Write-Host "artifact: $($_.FullName)" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: findx-${{ steps.ver.outputs.VERSION }}-windows
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: FindX ${{ steps.ver.outputs.VERSION }}
          files: dist/*
          generate_release_notes: true


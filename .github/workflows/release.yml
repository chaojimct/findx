name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 2.0.0）"
        required: true
        default: "2.0.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = ("${{ github.ref_name }}").TrimStart("v")
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "VERSION=$v"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust target cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: 单独 release 编译 CLI / 服务（保证 stage 一定能拿到 findx2.exe / fx.exe / findx2-service.exe）
        shell: pwsh
        run: |
          Remove-Item Env:CARGO_TARGET_DIR -ErrorAction SilentlyContinue
          cargo build --release -p findx2-cli -p findx2-service
          $rel = Join-Path $env:GITHUB_WORKSPACE "target\release"
          foreach ($f in @("findx2.exe","fx.exe","findx2-service.exe")) {
            $p = Join-Path $rel $f
            if (-not (Test-Path $p)) { throw "release 编译后仍缺少: $p" }
            Write-Host "OK: $p"
          }

      - name: 构建 Tauri GUI（不打 NSIS/MSI，仅产出 FindX.exe）
        working-directory: gui
        shell: pwsh
        run: |
          Remove-Item Env:CARGO_TARGET_DIR -ErrorAction SilentlyContinue
          npm run tauri build -- --no-bundle

      - name: 确认 GUI release 产物
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          Remove-Item Env:CARGO_TARGET_DIR -ErrorAction SilentlyContinue
          $rel = Join-Path $ws "target\release"
          $gui = $null
          foreach ($n in @("FindX.exe","findx2-gui.exe")) {
            $p = Join-Path $rel $n
            if (Test-Path $p) { $gui = $p; break }
          }
          if (-not $gui) {
            Write-Host "---- target\release 内容 ----"
            Get-ChildItem $rel -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            throw "未找到 GUI exe（FindX.exe 或 findx2-gui.exe），无法继续。"
          }
          Write-Host "OK gui: $gui"

      - name: 安装 Inno Setup 并制包
        shell: pwsh
        run: |
          choco install innosetup -y
          $v = "${{ steps.ver.outputs.VERSION }}"
          $ws = $env:GITHUB_WORKSPACE
          $stageScript = Join-Path $ws "installer\stage-inno.ps1"
          & $stageScript -RepoRoot $ws
          $stage = Join-Path $ws "installer\stage"
          foreach ($req in @("FindX.exe","findx2.exe","fx.exe","findx2-service.exe")) {
            $p = Join-Path $stage $req
            if (-not (Test-Path $p)) {
              Write-Host "---- installer\stage 内容 ----"
              Get-ChildItem $stage -Force -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
              throw "stage 缺少 $req，安装包将不可用。"
            }
            Write-Host "OK stage: $p"
          }
          $stageAbs = (Resolve-Path $stage).Path
          $iscc = "$(${env:ProgramFiles(x86)})\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = Join-Path $env:LOCALAPPDATA "Programs\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "未找到 ISCC，请确认 choco innosetup 安装成功。" }
          $iss = Join-Path $ws "installer\FindX.iss"
          $publishArg = '/DPublishDir=' + ($stageAbs.Replace('\', '/'))
          & $iscc /DMyAppVersion=$v $publishArg $iss

      - name: Collect artifacts
        shell: pwsh
        run: |
          $d = "$env:GITHUB_WORKSPACE\dist"
          if (-not (Get-ChildItem $d -Filter "FindX-*-setup.exe" -File -ErrorAction SilentlyContinue)) {
            Get-ChildItem $d -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "dist: $($_.Name)" }
            Write-Error "未找到 dist 下的 FindX-*-setup.exe，请检查 Inno 是否成功。"
            exit 1
          }
          Get-ChildItem $d -Filter "FindX-*-setup.exe" -File | ForEach-Object { Write-Host "artifact: $($_.FullName)" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: findx-${{ steps.ver.outputs.VERSION }}-windows
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: FindX ${{ steps.ver.outputs.VERSION }}
          files: dist/*
          generate_release_notes: true

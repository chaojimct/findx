name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 2.0.0）"
        required: true
        default: "2.0.4"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = ("${{ github.ref_name }}").TrimStart("v")
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "VERSION=$v"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: 构建 Tauri 程序与 resources（不打 NSIS/MSI）
        working-directory: gui
        run: npm run tauri build -- --no-bundle

      - name: 安装 Inno Setup 并制包
        shell: pwsh
        run: |
          choco install innosetup -y
          $v = "${{ steps.ver.outputs.VERSION }}"
          & powershell -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\installer\stage-inno.ps1" -RepoRoot $env:GITHUB_WORKSPACE
          $iscc = "$(${env:ProgramFiles(x86)})\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "未找到 ISCC: $iscc" }
          & $iscc /DMyAppVersion=$v "$env:GITHUB_WORKSPACE\installer\FindX.iss"

      - name: Collect artifacts
        shell: pwsh
        run: |
          $d = "$env:GITHUB_WORKSPACE\dist"
          if (-not (Get-ChildItem $d -Filter "FindX-*-setup.exe" -File -ErrorAction SilentlyContinue)) {
            Get-ChildItem $d -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "dist: $($_.Name)" }
            Write-Error "未找到 dist 下的 FindX-*-setup.exe，请检查 Inno 是否成功。"
            exit 1
          }
          Get-ChildItem $d -Filter "FindX-*-setup.exe" -File | ForEach-Object { Write-Host "artifact: $($_.FullName)" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: findx-${{ steps.ver.outputs.VERSION }}-windows
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: FindX ${{ steps.ver.outputs.VERSION }}
          files: dist/*
          generate_release_notes: true

